Được, đây là demo **1 file HTML duy nhất**. Bạn có thể tạo file ví dụ
`demo.html` để xem thử, không cần tách `style.css` hay `main.js`. ```html
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Demo</title>

    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
      }

      .calculator {
        width: 360px;
        height: 560px;
        border: 5px solid black;
        display: flex;
        flex-direction: column;
        background-color: black;
      }

      .display {
        flex: 4;
        display: flex;
        justify-content: flex-end;
        align-items: flex-end;
        padding: 20px;
        background-color: #111;
        color: white;
        box-sizing: border-box;
      }

      .result {
        font-size: 3rem;
        word-break: break-all;
      }

      .buttons {
        flex: 6;
        display: grid;
        grid-template-rows: repeat(5, 1fr);
        gap: 10px;
        padding: 10px;
        background-color: aqua;
        box-sizing: border-box;
      }

      .buttons > div {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .btn {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 12px;
        font-size: 2rem;
        cursor: pointer;
        background-color: white;
        transition: background-color 0.3s ease;
      }

      .btn:active {
        background-color: #1ebfc1;
      }
    </style>
  </head>

  <body>
    <div class="calculator">
      <div class="display">
        <div class="result">0</div>
      </div>

      <div class="buttons">
        <div>
          <button class="btn delete">⌫</button>
          <button class="btn clear">AC</button>
          <button class="btn percent">%</button>
          <button class="btn operator">÷</button>
        </div>

        <div>
          <button class="btn number">7</button>
          <button class="btn number">8</button>
          <button class="btn number">9</button>
          <button class="btn operator">×</button>
        </div>

        <div>
          <button class="btn number">4</button>
          <button class="btn number">5</button>
          <button class="btn number">6</button>
          <button class="btn operator">−</button>
        </div>

        <div>
          <button class="btn number">1</button>
          <button class="btn number">2</button>
          <button class="btn number">3</button>
          <button class="btn operator">+</button>
        </div>

        <div>
          <button class="btn plus-minus">±</button>
          <button class="btn number">0</button>
          <button class="btn decimal">.</button>
          <button class="btn equal">=</button>
        </div>
      </div>
    </div>

    <script>
      const result = document.querySelector(".result");
      const buttons = document.querySelectorAll(".btn");

      let currentValue = "";
      let previousValue = "";
      let operator = "";

      function updateDisplay() {
        result.textContent = currentValue || "0";
      }

      function calculate() {
        const prev = Number(previousValue);
        const current = Number(currentValue);

        if (operator === "+") return prev + current;
        if (operator === "−") return prev - current;
        if (operator === "×") return prev * current;
        if (operator === "÷") return prev / current;
      }

      buttons.forEach(function (button) {
        button.addEventListener("click", function () {
          const value = button.textContent;

          if (button.classList.contains("number")) {
            currentValue += value;
            updateDisplay();
          }

          if (button.classList.contains("decimal")) {
            if (!currentValue.includes(".")) {
              currentValue += ".";
              updateDisplay();
            }
          }

          if (button.classList.contains("operator")) {
            if (currentValue === "") return;

            previousValue = currentValue;
            operator = value;
            currentValue = "";
          }

          if (button.classList.contains("equal")) {
            if (previousValue === "" || currentValue === "" || operator === "")
              return;

            const answer = calculate();

            currentValue = String(answer);
            previousValue = "";
            operator = "";

            updateDisplay();
          }

          if (button.classList.contains("clear")) {
            currentValue = "";
            previousValue = "";
            operator = "";
            updateDisplay();
          }

          if (button.classList.contains("delete")) {
            currentValue = currentValue.slice(0, -1);
            updateDisplay();
          }

          if (button.classList.contains("plus-minus")) {
            if (currentValue === "") return;

            currentValue = String(Number(currentValue) * -1);
            updateDisplay();
          }

          if (button.classList.contains("percent")) {
            if (currentValue === "") return;

            currentValue = String(Number(currentValue) / 100);
            updateDisplay();
          }
        });
      });
    </script>
  </body>
</html>
```
